<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PMMG - Monitoramento IoT</title>
<!-- BEGIN: External Dependencies -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pmmg: {
              dark: '#0a0f1d',
              card: '#161e2d',
              accent: '#3b82f6',
              success: '#10b981',
              border: '#1e293b'
            }
          }
        }
      }
    }
  </script>
<!-- END: External Dependencies -->
<!-- BEGIN: Custom Styling -->
<style data-purpose="layout-styles">
    body {
      background-color: #0a0f1d;
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden; /* Prevent scrolling for a mobile app feel */
    }
    
    .map-container {
      height: calc(100vh - 280px); /* Adjust based on header/stat heights */
      position: relative;
      background-color: #0f172a;
      overflow: hidden;
    }

    /* Simple pulse animation for map points */
    .pulse-point {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
  </style>
<!-- END: Custom Styling -->
