version: '3.8'

services:
  nginx-prototipo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prototipo-dashboard-rfid
    ports:
      - "8155:80"
    volumes:
      # Para desenvolvimento com hot-reload (comente em produção)
      - ./html:/usr/share/nginx/html
      # Configuração personalizada do Nginx (opcional)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    restart: unless-stopped
    networks:
      - prototipo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  prototipo-network:
    driver: bridge